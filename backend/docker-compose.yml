version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sage
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: sage_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sage -d sage_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  lead-service:
    build:
      context: .
      dockerfile: services/lead-service/Dockerfile
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://sage:devpass@postgres:5432/sage_dev
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: development
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-sageconsulting.auth0.com}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-https://sage-api}
      HUBSPOT_API_KEY: ${HUBSPOT_API_KEY:-}
      HUBSPOT_PIPELINE_ID: ${HUBSPOT_PIPELINE_ID:-}
      HUBSPOT_STAGE_NEW_LEAD: ${HUBSPOT_STAGE_NEW_LEAD:-}
      IP_HASH_SALT: ${IP_HASH_SALT:-dev-salt-changeme}
      CORS_ORIGINS: "*"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    ports:
      - "8005:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://sage:devpass@postgres:5432/sage_dev
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: development
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-hello@sageconsulting.com}
      SENDGRID_TEMPLATE_LEAD_INTERNAL: ${SENDGRID_TEMPLATE_LEAD_INTERNAL:-}
      SENDGRID_TEMPLATE_LEAD_AUTOREPLY: ${SENDGRID_TEMPLATE_LEAD_AUTOREPLY:-}
      SENDGRID_TEMPLATE_DELIVERABLE_UPLOADED: ${SENDGRID_TEMPLATE_DELIVERABLE_UPLOADED:-}
      SENDGRID_TEMPLATE_MILESTONE_UPDATED: ${SENDGRID_TEMPLATE_MILESTONE_UPDATED:-}
      SENDGRID_TEMPLATE_CONSULTATION_CONFIRMED: ${SENDGRID_TEMPLATE_CONSULTATION_CONFIRMED:-}
      SENDGRID_TEMPLATE_WEEKLY_DIGEST: ${SENDGRID_TEMPLATE_WEEKLY_DIGEST:-}
      INTERNAL_ALERT_EMAIL: ${INTERNAL_ALERT_EMAIL:-strategy@sageconsulting.com}
      CALCOM_WEBHOOK_SECRET: ${CALCOM_WEBHOOK_SECRET:-}
      REDIS_CONSUMER_GROUP: notification-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
  redis_data:
